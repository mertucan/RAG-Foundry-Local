<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG Foundry Local</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="sidebar" aria-label="Durum paneli">
          <div>
            <p class="eyebrow">Local RAG</p>
            <h1>Foundry Local Assistant</h1>
            <p class="lead">Dokumanlarini yerelde arar, en ilgili parcalari bulur ve cevabi kaynaklarla birlikte uretir.</p>
          </div>

          <dl class="status-grid">
            <div>
              <dt>Chunk</dt>
              <dd id="chunkCount">-</dd>
            </div>
            <div>
              <dt>Embedding</dt>
              <dd id="embeddingProvider">-</dd>
            </div>
            <div>
              <dt>Cevap</dt>
              <dd id="answerProvider">-</dd>
            </div>
          </dl>

          <div class="quick-actions" aria-label="Ornek sorular">
            <button type="button" data-question="Bu projenin amaci nedir?">Amac</button>
            <button type="button" data-question="RAG mimarisi nasil calisiyor?">Mimari</button>
            <button type="button" data-question="Hangi kaynaklardan cevap veriyorsun?">Kaynaklar</button>
          </div>
        </aside>

        <section class="chat-panel" aria-label="Soru cevap arayuzu">
          <div id="messages" class="messages" aria-live="polite">
            <article class="message assistant">
              <span>Hazirim. Bir soru sor; cevabi yerel dokumanlardan gelen kaynaklarla birlikte gosterecegim.</span>
            </article>
          </div>

          <form id="questionForm" class="composer">
            <label class="sr-only" for="questionInput">Soru</label>
            <textarea id="questionInput" rows="3" placeholder="Ornek: Week 3 sonunda ne teslim edilmeli?"></textarea>
            <button id="sendButton" type="submit">Gonder</button>
          </form>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
